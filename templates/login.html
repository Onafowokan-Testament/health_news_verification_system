{% extends "base.html" %}
{% block title %}Sign in — MedVer{% endblock %}
{% block content %}
<section class="hero">
    <span class="hero-badge">Account</span>
    <h1>Sign in</h1>
    <p class="hero-lead">Use the email and password you registered with.</p>
</section>

<section class="card auth-panel">
    <div class="card-header">
        <h2>Welcome back</h2>
        <p>New here? <a href="/register">Create an account</a></p>
    </div>
    <form action="/login" method="post" class="form-grid">
        <input type="hidden" name="next" value="{{ next_url }}">
        <div>
            <label for="email">Email</label>
            <input id="email" name="email" type="email" required autocomplete="email" autofocus>
        </div>
        <div>
            <label for="password">Password</label>
            <input id="password" name="password" type="password" required autocomplete="current-password">
        </div>
        <div class="form-actions">
            <button type="submit">Sign in</button>
        </div>
    </form>
    {% if error %}
    <div class="card-footer">
        <p class="error-text" style="margin:0;">{{ error }}</p>
    </div>
    {% endif %}
</section>
{% endblock %}
